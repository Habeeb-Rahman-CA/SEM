version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sem-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: habizz22
      POSTGRES_DB: sem-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sem-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: sem-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

  sem-backend:
    build:
      context: ./sem-backend
      dockerfile: Dockerfile
    container_name: sem-backend
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=habizz22
      - DB_DATABASE=sem-dev
      - DB_SYNCHRONIZE=true
      - JWT_SECRET=super-secret-key-12345
      - JWT_EXPIRATION=15m
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - CLOUDINARY_CLOUD_NAME=lmekaycw
      - CLOUDINARY_API_KEY=417186344657729
      - CLOUDINARY_API_SECRET=7lvDAEc7d0R1tR1HbgEA_3DpCzE
    ports:
      - "3001:3001"

  sem-frontend:
    build:
      context: ./sem-frontend
      dockerfile: Dockerfile
    container_name: sem-frontend
    restart: always
    depends_on:
      - sem-backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data:
  elastic_data:
